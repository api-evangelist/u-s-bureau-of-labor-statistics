naftiko: "1.0.0-alpha1"

info:
  label: "BLS Public Data API"
  description: >-
    The BLS Public Data API provides programmatic access to U.S. Bureau of
    Labor Statistics time series data covering employment, unemployment, prices,
    wages, and other economic indicators. Supports Version 1 (no auth) and
    Version 2 (API key for higher limits and calculations).
  tags:
    - Bureau of Labor Statistics
    - Labor
    - Employment
    - Statistics
    - Economic Data
    - Federal Government
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      BLS_API_KEY: BLS_API_KEY

capability:
  consumes:
    - type: http
      namespace: bls-public-data
      baseUri: https://api.bls.gov/publicAPI/v2
      description: "BLS Public Data API v2 for time series labor statistics."
      authentication:
        type: apikey
        key: registrationkey
        value: "{{BLS_API_KEY}}"
        placement: query
      resources:
        - name: time-series
          path: /timeseries/data
          description: "Time series data for BLS economic indicators."
          operations:
            - name: get-single-series
              method: GET
              description: "Retrieve time series data for a single BLS series ID."
              inputParameters:
                - name: seriesId
                  in: path
                  type: string
                  required: true
                  description: "BLS series ID (e.g., CUUR0000SA0 for CPI)."
                - name: startyear
                  in: query
                  type: string
                  required: false
                  description: "First year of data in YYYY format."
                - name: endyear
                  in: query
                  type: string
                  required: false
                  description: "Last year of data in YYYY format."
                - name: catalog
                  in: query
                  type: boolean
                  required: false
                  description: "Include catalog metadata."
                - name: calculations
                  in: query
                  type: boolean
                  required: false
                  description: "Include net and percent change calculations."
                - name: annualaverage
                  in: query
                  type: boolean
                  required: false
                  description: "Include annual averages."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-multiple-series
              method: POST
              description: "Retrieve data for multiple BLS series IDs in one request."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  seriesid: "{{tools.series_ids}}"
                  startyear: "{{tools.start_year}}"
                  endyear: "{{tools.end_year}}"
                  catalog: "{{tools.catalog}}"
                  calculations: "{{tools.calculations}}"
                  annualaverage: "{{tools.annual_average}}"

        - name: popular-series
          path: /timeseries/popular
          description: "Access to the most popular BLS time series."
          operations:
            - name: get-popular-series
              method: GET
              description: "Retrieve the 25 most popular BLS series IDs."
              inputParameters:
                - name: survey
                  in: query
                  type: string
                  required: false
                  description: "Survey abbreviation to filter popular series."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: surveys
          path: /surveys
          description: "BLS survey metadata and catalog."
          operations:
            - name: get-all-surveys
              method: GET
              description: "Retrieve metadata for all available BLS surveys."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-survey-metadata
              method: GET
              description: "Retrieve metadata for a specific BLS survey."
              inputParameters:
                - name: surveyId
                  in: path
                  type: string
                  required: true
                  description: "Survey abbreviation (e.g., CPS, CES, AP)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: bls-public-data-rest
      resources:
        - path: /v1/timeseries/{seriesId}
          name: single-series
          description: "Get time series data for a single BLS series."
          operations:
            - method: GET
              name: get-single-series
              description: "Retrieve historical data for a single BLS series ID."
              call: "bls-public-data.get-single-series"
              with:
                seriesId: "rest.seriesId"
                startyear: "rest.startyear"
                endyear: "rest.endyear"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/timeseries
          name: multiple-series
          description: "Get time series data for multiple BLS series."
          operations:
            - method: POST
              name: get-multiple-series
              description: "Retrieve data for multiple BLS series in one request."
              call: "bls-public-data.get-multiple-series"
              with:
                series_ids: "rest.seriesid"
                start_year: "rest.startyear"
                end_year: "rest.endyear"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/timeseries/popular
          name: popular-series
          description: "Get the most popular BLS series."
          operations:
            - method: GET
              name: get-popular-series
              description: "Retrieve the 25 most popular BLS time series."
              call: "bls-public-data.get-popular-series"
              with:
                survey: "rest.survey"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/surveys
          name: surveys
          description: "List all available BLS surveys."
          operations:
            - method: GET
              name: get-all-surveys
              description: "Retrieve metadata for all BLS surveys."
              call: "bls-public-data.get-all-surveys"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/surveys/{surveyId}
          name: survey-metadata
          description: "Get metadata for a specific BLS survey."
          operations:
            - method: GET
              name: get-survey-metadata
              description: "Retrieve metadata for a specific BLS survey by abbreviation."
              call: "bls-public-data.get-survey-metadata"
              with:
                surveyId: "rest.surveyId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: bls-public-data-mcp
      transport: http
      tools:
        - name: get-single-series
          description: "Retrieve time series data for a single BLS series ID (e.g., unemployment rate, CPI)."
          hints:
            readOnly: true
            openWorld: true
          call: "bls-public-data.get-single-series"
          with:
            seriesId: "tools.series_id"
            startyear: "tools.start_year"
            endyear: "tools.end_year"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-multiple-series
          description: "Retrieve time series data for multiple BLS series IDs in a single request."
          hints:
            readOnly: true
            openWorld: true
          call: "bls-public-data.get-multiple-series"
          with:
            series_ids: "tools.series_ids"
            start_year: "tools.start_year"
            end_year: "tools.end_year"
            calculations: "tools.calculations"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-popular-series
          description: "Retrieve the 25 most popular BLS time series, optionally filtered by survey."
          hints:
            readOnly: true
            openWorld: true
          call: "bls-public-data.get-popular-series"
          with:
            survey: "tools.survey"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-all-surveys
          description: "List all available BLS surveys with their abbreviations and descriptions."
          hints:
            readOnly: true
            openWorld: false
          call: "bls-public-data.get-all-surveys"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-survey-metadata
          description: "Get detailed metadata for a specific BLS survey by its abbreviation."
          hints:
            readOnly: true
            openWorld: false
          call: "bls-public-data.get-survey-metadata"
          with:
            surveyId: "tools.survey_id"
          outputParameters:
            - type: object
              mapping: "$."
