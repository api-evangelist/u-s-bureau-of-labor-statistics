  - type: Features
    data:
      - name: Time Series Data Access
        description: >-
          Retrieve historical labor statistics data using BLS series IDs
          covering employment, unemployment, CPI, wages, and productivity.
      - name: Multiple Series in One Request
        description: >-
          Version 2 API allows requesting up to 50 series in a single POST
          request, returning 20 years of data per series.
      - name: Net and Percent Change Calculations
        description: >-
          Optional calculations including net change and percent change from
          prior periods are available in Version 2 responses.
      - name: Survey Catalog Discovery
        description: >-
          Retrieve metadata for all available BLS surveys and discover popular
          series IDs through the catalog endpoint.
      - name: Annual Averages
        description: >-
          Request annual average values (M13 period) alongside monthly data
          for trend analysis.
      - name: Public API with Free Registration
        description: >-
          The BLS API is free to use. Version 1 requires no registration;
          Version 2 requires a free API key for higher query limits.
  - type: UseCases
    data:
      - name: Economic Research
        description: >-
          Economists and researchers use BLS time series data to analyze
          labor market trends, wage growth, and employment cycles.
      - name: Inflation Monitoring
        description: >-
          Track CPI and PPI data for measuring inflation trends across
          consumer goods, food, energy, and other categories.
      - name: Employment Policy Analysis
        description: >-
          Policy analysts use unemployment and employment statistics to
          evaluate labor market conditions and inform policy decisions.
      - name: Dashboard and Application Development
        description: >-
          Developers integrate BLS data into economic dashboards,
          journalism applications, and data visualization tools.
      - name: Academic Research
        description: >-
          Universities and think tanks use BLS historical data for
          econometric modeling, academic papers, and policy reports.
  - type: Integrations
    data:
      - name: Python blsapi
        description: >-
          Open-source Python package for querying the BLS API with
          support for v1 and v2 endpoints.
      - name: R blsAPI
        description: >-
          CRAN R package providing a simple interface to the BLS Public
          Data API for statistical computing.
      - name: Microsoft Power Platform
        description: >-
          BLS connector available in Power Automate, Power Apps, and
          Copilot Studio for low-code BLS data access.
      - name: data.gov
        description: >-
          BLS datasets are cataloged on data.gov as part of the federal
          open data initiative.
