apis:
  - aid: u-s-bureau-of-labor-statistics:bls-api
    name: BLS Public Data API
    description: >-
      The BLS Public Data API provides programmatic access to published
      historical time series data covering employment, unemployment, consumer
      prices, wages, productivity, and other labor market indicators. Version 2
      (registration required) supports up to 50 series per request, 20 years
      of data, and optional calculations including net and percent changes.
    humanURL: https://www.bls.gov/developers/
    baseURL: https://api.bls.gov/publicAPI/v2
    tags:
      - Labor Statistics
      - Employment
      - Unemployment
      - Consumer Prices
      - Wages
