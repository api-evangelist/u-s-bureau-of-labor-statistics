aid: u-s-bureau-of-labor-statistics
name: U.S. Bureau of Labor Statistics
description: >-
  The U.S. Bureau of Labor Statistics (BLS) is the principal federal statistical
  agency responsible for measuring labor market activity, working conditions, and
  price changes in the U.S. economy. BLS collects, processes, analyzes, and
  disseminates statistical data on employment, unemployment, inflation, wages,
  productivity, and occupational safety through a public API that provides
  programmatic access to published historical time series data.
